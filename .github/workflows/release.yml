name: Release

on:
  push:
    tags:
      - "release/v[0-9]+.*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux targets use glibc (gnu, not musl) and plain cargo,
          # not zigbuild. Reason: virgil-cli loads the duckpgq
          # community extension at runtime via DuckDB's LOAD, which
          # dlopens a .duckdb_extension shared library. A fully
          # statically linked musl binary has no dynamic linker and
          # the LOAD fails with "Extension not found". Glibc dynamic
          # linking restores the runtime dlopen path. Trade-off:
          # binaries built on ubuntu-latest's glibc won't run on
          # significantly older distros (RHEL/CentOS pre-2024) or on
          # Alpine.
          # Pinned to Ubuntu 22.04 (glibc 2.35) instead of
          # ubuntu-latest (24.04, glibc 2.39) so the resulting binary
          # runs against the broader base of distros — notably
          # cloudflare/sandbox and similar 22.04-derived images.
          # GH-hosted 22.04 support runs through April 2027; bump
          # the runner label when it nears EOL.
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive: tar.gz
            build: cargo
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            archive: tar.gz
            build: cargo
          - target: x86_64-apple-darwin
            runner: macos-14
            archive: tar.gz
            build: cargo
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
            build: cargo
          # Windows dropped — see Cargo.toml note on the binstall
          # section. Re-add when the upstream libduckdb-sys/fmt issue
          # is resolved.

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (cargo)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../virgil-cli-${{ matrix.target }}.tar.gz virgil-cli
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: virgil-cli-${{ matrix.target }}
          path: virgil-cli-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum virgil-cli-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/virgil-cli-*.tar.gz
            artifacts/virgil-cli-*.zip
            artifacts/SHA256SUMS.txt
